<!-- tangerine/index.html — FINAL PASS -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#070708" />
  <title>Tangerine</title>

  <!-- paste tokens.css into /tokens.css or inline it here -->
  <link rel="stylesheet" href="./tokens.css"/>

  <style>
    a{color:inherit}
    .dot{color:var(--pilot-orange)}
    @media (max-width:900px){
      .tri{grid-template-columns:1fr !important}
    }
  </style>
</head>
<body>
<div class="grid-bg"></div><div class="grain"></div>

<!-- darker quadrant + warm aura -->
<div style="position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(70% 60% at 18% 22%, rgba(255,106,0,.14), transparent 60%),
  radial-gradient(70% 70% at 86% 64%, rgba(0,0,0,.92), transparent 66%),
  radial-gradient(80% 80% at 90% 92%, rgba(0,0,0,.92), transparent 70%);
"></div>

<div class="wrap">
  <header>
    <div class="brand" style="display:flex;gap:10px;align-items:center;">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--pilot-orange);display:inline-block;"></span>
      Tangerine
    </div>
    <div class="ui">
      <span class="toggle" id="toggle">Light</span>
    </div>
  </header>

  <main style="max-width:860px;margin-top:44px;">
    <h1 style="font-family:var(--serif);font-size:82px;letter-spacing:-1px;line-height:.92;margin:0 0 8px;">
      Tangerine
    </h1>
    <div style="font-family:var(--mono);font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);">
      Motion, slowly
    </div>

    <!-- asymmetry + hush -->
    <div class="tri" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px;
      font-family:var(--mono);font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--fg);">
      <div style="opacity:.92;">
        <span class="dot">●</span> Now — GIRL
      </div>
      <div style="opacity:.72;transform:translateY(12px);">
        <span class="dot">●</span> Next — MONK
      </div>
      <div style="opacity:.62;transform:translateX(-8px);">
        <span class="dot">●</span> Always — CONTINUUM
      </div>
    </div>

    <div style="margin-top:44px;font-family:var(--mono);font-size:10px;letter-spacing:2.2px;text-transform:uppercase;color:var(--muted);opacity:.32;">
      tap the veil
    </div>
  </main>

  <footer>
    <span>© <span id="y"></span> tangerine</span>
    <span>a small light</span>
  </footer>
</div>

<script>
const root=document.documentElement;
const key="tangerine-theme";
const saved=localStorage.getItem(key);

function setTheme(m){
  root.setAttribute("data-theme",m);
  localStorage.setItem(key,m);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", m==="light" ? "#f6f3ee" : "#070708");
  document.getElementById("toggle").textContent = m==="light" ? "Dark" : "Light";
}

setTheme(saved || "dark");
document.getElementById("toggle").onclick=()=>setTheme(root.getAttribute("data-theme")==="dark"?"light":"dark");

document.getElementById("y").textContent = new Date().getFullYear();
</script>
</body>
</html>
