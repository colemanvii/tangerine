<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Tangerine" />
  <meta name="theme-color" content="#070708" />
  <title>Tangerine</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <style>
    :root{ --pilot: var(--pilot2); } /* tangerine */

    .aura{
      position:fixed; inset:-30vh -20vw; pointer-events:none; z-index:0;
      background:
        radial-gradient(60vw 40vw at 20% 20%, rgba(255,106,0,.10), transparent 60%),
        radial-gradient(55vw 45vw at 80% 30%, rgba(255,255,255,.05), transparent 62%),
        radial-gradient(70vw 55vw at 40% 85%, rgba(255,106,0,.07), transparent 65%);
      filter: blur(18px) saturate(115%);
      opacity:.90;
      animation: drift 18s ease-in-out infinite;
    }
    @keyframes drift{
      0%,100%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(2.5vw,-1.5vh,0) scale(1.03); }
    }
    @media (prefers-reduced-motion: reduce){ .aura{animation:none} }

    .veil{
      cursor:pointer; user-select:none;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--panel) 95%, transparent), transparent 58%),
        radial-gradient(1200px 420px at 15% 10%, rgba(255,106,0,.07), transparent 60%),
        radial-gradient(900px 420px at 85% 15%, rgba(255,255,255,.04), transparent 62%);
      position:relative;
    }
    .veil:before{
      content:""; position:absolute; inset:-40% -30%;
      background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,.06) 50%, transparent 65%);
      transform: rotate(8deg);
      opacity:.18;
      animation: sweep 12s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes sweep{
      0%,100%{ transform: translateX(-8%) rotate(8deg); opacity:.09; }
      50%{ transform: translateX(8%) rotate(8deg); opacity:.18; }
    }
    @media (prefers-reduced-motion: reduce){ .veil:before{animation:none} }

    h1{
      margin:0;
      font-family:var(--serif);
      font-size: clamp(54px, 8vw, 94px);
      font-weight:560;
      letter-spacing:-.9px;
      line-height:.92;
    }
    .sub{font-family:var(--mono);font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-top:8px}

    .sigils{
      display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px; margin-top:18px;
    }
    @media (max-width:900px){ .sigils{grid-template-columns:1fr} }

    .module{
      border-radius:18px;border:1px solid var(--hair2);
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      padding:16px;
      display:flex; align-items:center; justify-content:space-between; gap:14px;
    }
    .tag{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
    .dot{width:7px;height:7px;border-radius:999px;background:var(--pilot);box-shadow:0 0 0 7px rgba(255,106,0,.06)}
    .word{font-family:var(--mono);font-size:12px;letter-spacing:1.8px;text-transform:uppercase;opacity:.92}

    .sigil{
      width:46px;height:46px;border-radius:999px;border:1px solid var(--hair);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,106,0,.14), transparent 62%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 70%);
      position:relative;
      opacity:.95;
    }
    .sigil:before{content:"";position:absolute;inset:10px;border-radius:999px;border:1px dashed color-mix(in srgb, var(--pilot) 35%, var(--hair2));opacity:.55;transform:rotate(12deg)}
    .sigil:after{content:"";position:absolute;inset:18px;border-radius:999px;background:color-mix(in srgb, var(--pilot) 55%, transparent);opacity:.14}
    .sigil.monk:before{border-style:solid;opacity:.26}
    .sigil.cont:after{opacity:.20}

    .hint{margin-top:12px;font-family:var(--mono);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);opacity:.65}

    .pulse{animation:pulse .42s ease}
    @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(.994)}100%{transform:scale(1)}}
  </style>
</head>

<body>
  <div class="aura"></div>
  <div class="grid-bg"></div>
  <div class="grain"></div>

  <div class="wrap">
    <header>
      <div class="sig">
        <span class="pilot" aria-hidden="true"></span>
        <div class="domain">Tangerine</div>
      </div>

      <div class="ui">
        <span class="toggle" id="themeToggle" role="button" aria-label="Toggle theme">
          <span id="themeLabel">Dark</span>
          <span class="switch" aria-hidden="true"><span class="knob"></span></span>
        </span>
      </div>
    </header>

    <main class="card veil fade" id="veil" role="button" tabindex="0" aria-label="Enter">
      <div class="in">
        <div class="fade d2">
          <h1>Tangerine</h1>
          <div class="sub">motion, slowly</div>
        </div>

        <section class="sigils fade d3" aria-label="Sigils">
          <div class="module">
            <div class="tag"><span class="dot"></span> now</div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="sigil girl" aria-hidden="true"></span>
              <span class="word">GIRL</span>
            </div>
          </div>

          <div class="module">
            <div class="tag"><span class="dot"></span> next</div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="sigil monk" aria-hidden="true"></span>
              <span class="word">MONK</span>
            </div>
          </div>

          <div class="module">
            <div class="tag"><span class="dot"></span> always</div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="sigil cont" aria-hidden="true"></span>
              <span class="word">CONTINUUM</span>
            </div>
          </div>
        </section>

        <div class="hint fade d4">tap the veil</div>
      </div>
    </main>

    <footer>
      <div>© <span id="y"></span> tangerine</div>
      <div>a small light</div>
    </footer>
  </div>

  <script>
    // theme
    const root = document.documentElement;
    const key = "tangerine-theme";
    const saved = localStorage.getItem(key);
    const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;

    function setTheme(mode){
      root.setAttribute("data-theme", mode);
      localStorage.setItem(key, mode);
      document.getElementById("themeLabel").textContent = (mode === "light") ? "Light" : "Dark";
      document.querySelector('meta[name="theme-color"]').setAttribute("content", (mode==="light") ? "#f7f4ef" : "#070708");
    }
    setTheme(saved || (prefersLight ? "light" : "dark"));

    document.getElementById("themeToggle").addEventListener("click", (e) => {
      e.stopPropagation();
      const cur = root.getAttribute("data-theme") || "dark";
      setTheme(cur === "light" ? "dark" : "light");
    });

    document.getElementById("y").textContent = new Date().getFullYear();

    // door
    const DESTINATION = "#"; // set later
    const veil = document.getElementById("veil");
    function enter(){
      veil.classList.remove("pulse"); void veil.offsetWidth; veil.classList.add("pulse");
      if (DESTINATION && DESTINATION !== "#") window.location.href = DESTINATION;
    }
    veil.addEventListener("click", enter);
    veil.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); enter(); }});
  </script>
</body>
</html>
