<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Tangerine — Mobile Card</title>

  <style>
    :root{
      --bg: #0b0b0c;
      --fg: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --faint: rgba(255,255,255,.12);
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.04);
      --shadow: 0 24px 80px rgba(0,0,0,.55);
      --radius: 26px;
      --pad: 28px;

      --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, "EB Garamond", Garamond, serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }

    /* Light theme variables (applied via [data-theme="light"]) */
    [data-theme="light"]{
      --bg: #f4f1ea;
      --fg: rgba(18,18,18,.92);
      --muted: rgba(18,18,18,.62);
      --faint: rgba(18,18,18,.14);
      --card: rgba(255,255,255,.72);
      --card2: rgba(255,255,255,.55);
      --shadow: 0 24px 80px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 900px at 20% 15%, rgba(255,140,70,.14), transparent 60%),
                  radial-gradient(900px 700px at 78% 22%, rgba(120,200,255,.10), transparent 55%),
                  radial-gradient(900px 900px at 45% 80%, rgba(255,255,255,.06), transparent 60%),
                  var(--bg);
      color:var(--fg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px;
    }

    .shell{
      width:min(560px, 100%);
      position:relative;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }

    .brandline{
      display:flex;
      flex-direction:column;
      gap:4px;
      padding-left:6px;
    }
    .brandline .kicker{
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: lowercase;
      color: var(--muted);
    }
    .brandline .sub{
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity:.95;
    }

    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--faint);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(800px 500px at 18% 12%, rgba(255,140,70,.22), transparent 58%),
        radial-gradient(700px 520px at 78% 22%, rgba(120,200,255,.14), transparent 58%),
        radial-gradient(700px 700px at 40% 88%, rgba(255,255,255,.10), transparent 62%);
      filter: blur(10px);
      opacity:.55;
      pointer-events:none;
    }

    .inner{
      position:relative;
      padding: var(--pad);
      display:flex;
      flex-direction:column;
      gap: 18px;
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .titleblock{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    h1{
      margin:0;
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing: .01em;
      font-size: clamp(34px, 7.2vw, 46px);
      line-height: 1.02;
    }

    .work{
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge{
      flex:0 0 auto;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--faint);
      background: rgba(0,0,0,.10);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    [data-theme="light"] .badge{
      background: rgba(255,255,255,.35);
    }

    .dot{
      width:7px; height:7px; border-radius:50%;
      background: rgba(255,140,70,.85);
      box-shadow: 0 0 0 3px rgba(255,140,70,.18);
    }

    .copy{
      margin-top: 4px;
      display:flex;
      flex-direction:column;
      gap: 14px;
      max-width: 26ch; /* forces “one breath” */
    }

    .copy p{
      margin:0;
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.6;
      color: var(--fg);
    }

    .copy .muted{
      color: var(--muted);
    }

    .sig{
      margin-top: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: lowercase;
      color: var(--muted);
    }

    /* Toggle */
    .toggle{
      display:flex;
      align-items:center;
      gap:10px;
      user-select:none;
    }
    .toggle label{
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .switch{
      position:relative;
      width: 52px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--faint);
      background: rgba(255,255,255,.08);
      cursor:pointer;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }
    [data-theme="light"] .switch{
      background: rgba(0,0,0,.06);
    }

    .knob{
      position:absolute;
      top:50%;
      left: 3px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.88);
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      transition: left .18s ease;
    }
    [data-theme="light"] .knob{
      background: rgba(18,18,18,.88);
      box-shadow: 0 10px 22px rgba(0,0,0,.12);
    }

    .switch[aria-checked="true"] .knob{ left: 25px; }

    /* Micro mobile tuning */
    @media (max-width: 420px){
      :root{ --pad: 24px; }
      .badge{ display:none; } /* keep first view quiet */
      .copy{ max-width: 24ch; }
      .copy p{ font-size: 16px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <div class="topbar">
        <div class="brandline">
          <div class="kicker">ex.tangerina</div>
          <div class="sub">mobile card</div>
        </div>

        <div class="toggle" aria-label="Theme toggle">
          <label id="themeLabel" for="themeSwitch">Dark</label>
          <button id="themeSwitch" class="switch" type="button" role="switch" aria-checked="true" aria-labelledby="themeLabel">
            <span class="knob" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <main class="card" role="article" aria-label="Tangerine card">
        <div class="inner">
          <header class="header">
            <div class="titleblock">
              <h1>Tangerine</h1>
              <div class="work">art, in progress</div>
            </div>

            <div class="badge" aria-hidden="true">
              <span class="dot"></span>
              issued from within
            </div>
          </header>

          <section class="copy">
            <p>Not a brand.<br/>A provenance.</p>
            <p class="muted">A small light,<br/>kept warm.</p>
            <p class="muted">Enter quietly.<br/>Look slowly.<br/>Leave with something true.</p>
          </section>

          <footer class="sig">— a veiled room on the internet</footer>
        </div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeSwitch");
      const label = document.getElementById("themeLabel");

      // initial: stored preference > system preference > dark
      const stored = localStorage.getItem("tangerine-theme");
      const systemPrefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      const initial = stored || (systemPrefersLight ? "light" : "dark");
      setTheme(initial);

      btn.addEventListener("click", () => {
        const next = (root.getAttribute("data-theme") === "light") ? "dark" : "light";
        setTheme(next);
      });

      function setTheme(mode){
        root.setAttribute("data-theme", mode);
        const isDark = mode === "dark";
        btn.setAttribute("aria-checked", String(isDark));
        label.textContent = isDark ? "Dark" : "Light";
        localStorage.setItem("tangerine-theme", mode);
      }
    })();
  </script>
</body>
</html>
